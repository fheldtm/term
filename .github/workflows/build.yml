name: Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    needs: check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Package web server bundle
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          bundle="ssh-terminal-composer-web-${version}"
          mkdir -p "release-assets/${bundle}"
          cp -R dist dist-server package.json package-lock.json README.md "release-assets/${bundle}/"
          tar -C release-assets -czf "release-assets/${bundle}.tar.gz" "${bundle}"
          rm -rf "release-assets/${bundle}"

      - name: Generate checksums
        working-directory: release-assets
        run: sha256sum * > SHA256SUMS.txt

      - uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          overwrite_files: true
